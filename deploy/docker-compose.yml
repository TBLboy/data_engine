services:
  backend:
    build:
      context: ../backend
    container_name: robot-qc-backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://robot_qc:${POSTGRES_PASSWORD}@db:5432/robot_qc
      SECRET_KEY: ${SECRET_KEY}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-yaocao}
      AI_EXPLAIN_ENABLED: ${AI_EXPLAIN_ENABLED:-true}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      AI_EXPLAIN_TIMEOUT_SECONDS: ${AI_EXPLAIN_TIMEOUT_SECONDS:-120}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5

  frontend:
    build:
      context: ../frontend
    container_name: robot-qc-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "58080:80"
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: robot-qc-db
    environment:
      POSTGRES_DB: robot_qc
      POSTGRES_USER: robot_qc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - robot_qc_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot_qc -d robot_qc"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  robot_qc_postgres:
