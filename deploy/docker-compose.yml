services:
  backend:
    build:
      context: ../backend
    container_name: robot-qc-backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://robot_qc:${POSTGRES_PASSWORD}@db:5432/robot_qc
      SECRET_KEY: ${SECRET_KEY}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-yaocao}
      AI_EXPLAIN_ENABLED: ${AI_EXPLAIN_ENABLED:-true}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      AI_EXPLAIN_TIMEOUT_SECONDS: ${AI_EXPLAIN_TIMEOUT_SECONDS:-120}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      - ../:/app/project:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5

  scan-coordinator:
    build:
      context: ../backend
    container_name: robot-qc-scan-coordinator
    command: python -m app.services.scan_coordinator
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://robot_qc:${POSTGRES_PASSWORD}@db:5432/robot_qc
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-yaocao}
      SCAN_CRON_HOUR: ${SCAN_CRON_HOUR:-0}
      SCAN_CRON_MINUTE: ${SCAN_CRON_MINUTE:-0}
      SCAN_FULL_CRON_DAY_OF_WEEK: ${SCAN_FULL_CRON_DAY_OF_WEEK:-sun}
      SCAN_FULL_CRON_HOUR: ${SCAN_FULL_CRON_HOUR:-2}
      SCAN_FULL_CRON_MINUTE: ${SCAN_FULL_CRON_MINUTE:-0}
      SCAN_COORDINATOR_INTERVAL_SECONDS: ${SCAN_COORDINATOR_INTERVAL_SECONDS:-10}
      DATA_ASSETS_RECOMPUTE_INTERVAL_SECONDS: ${DATA_ASSETS_RECOMPUTE_INTERVAL_SECONDS:-60}
      DATA_ASSETS_RECOMPUTE_BATCH_LIMIT: ${DATA_ASSETS_RECOMPUTE_BATCH_LIMIT:-100}
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5

  scan-worker:
    build:
      context: ../backend
    command: python -m app.services.scan_worker
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://robot_qc:${POSTGRES_PASSWORD}@db:5432/robot_qc
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_REGION: ${MINIO_REGION:-}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-yaocao}
      SCAN_WORKER_POLL_SECONDS: ${SCAN_WORKER_POLL_SECONDS:-2.0}
      SCAN_WORKER_LEASE_SECONDS: ${SCAN_WORKER_LEASE_SECONDS:-90}
      SCAN_WORKER_HEARTBEAT_SECONDS: ${SCAN_WORKER_HEARTBEAT_SECONDS:-10}
      SCAN_SHARD_TIMEOUT_SECONDS: ${SCAN_SHARD_TIMEOUT_SECONDS:-600}
      SCAN_MISSING_CONFIRMATION_SECONDS: ${SCAN_MISSING_CONFIRMATION_SECONDS:-600}
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5

  frontend:
    build:
      context: ../frontend
    container_name: robot-qc-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "58080:80"
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: robot-qc-db
    environment:
      POSTGRES_DB: robot_qc
      POSTGRES_USER: robot_qc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - robot_qc_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot_qc -d robot_qc"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  robot_qc_postgres:
