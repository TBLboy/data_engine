services:
  backend:
    build:
      context: ../backend
    container_name: robot-qc-backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://robot_qc:robot_qc@db:5432/robot_qc
      SECRET_KEY: change-me-before-deploy
      SESSION_COOKIE_SECURE: "false"
      FRONTEND_ORIGIN: http://localhost:8080
    depends_on:
      - db
    volumes:
      - /data/collection_data:/data/collection_data
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    container_name: robot-qc-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: robot-qc-db
    environment:
      POSTGRES_DB: robot_qc
      POSTGRES_USER: robot_qc
      POSTGRES_PASSWORD: robot_qc
    volumes:
      - robot_qc_postgres:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  robot_qc_postgres:
